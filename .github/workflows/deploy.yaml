name: Three-Tier-App CI/CD

concurrency:
  group: three-tier-deploy
  cancel-in-progress: false


  

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      - 'terra-config/**'

jobs:
  # Job 1: Test the code
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4               # Loads a Fresh Ubuntu Machine

    - name: Set up Node.js
      uses: actions/setup-node@v4               # Downloads  Node Js Version 22
      with:
        node-version: '22'

    - name: Install and Test Backend
      run: |
        cd backend                                
        npm install                        # NPM install means downloads all dependencies from package.json
        npm test --if-present              # NPM test runs the test script if it exists and skip if it dosent without failing

    - name: Install and Test Frontend
      run: |
        cd frontend
        npm install
        CI=true npm test -- --passWithNoTests    # Prevent CI from failing if no React tests exist yet , Sets CI= True




  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR Public
      run: |
        aws ecr-public get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin public.ecr.aws

    - name: Build and Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: public.ecr.aws/l9q3x7d5/three-tier-frontend:${{ github.run_id }}

    - name: Build and Push Backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: public.ecr.aws/l9q3x7d5/three-tier-backend:${{ github.run_id }}
  
  



  update-k8s:
    runs-on: ubuntu-latest
    needs: push
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update Frontend image tag
      run: |
        sed -i 's|image: public.ecr.aws/l9q3x7d5/three-tier-frontend:.*|image: public.ecr.aws/l9q3x7d5/three-tier-frontend:${{ github.run_id }}|' k8s_manifests/frontend-deployment.yaml

    - name: Update Backend image tag
      run: |
        sed -i 's|image: public.ecr.aws/l9q3x7d5/three-tier-backend:.*|image: public.ecr.aws/l9q3x7d5/three-tier-backend:${{ github.run_id }}|' k8s_manifests/backend-deployment.yaml

    - name: Commit and push updated tags
      run: |
        git config --global user.email "rageworking1210@gmail.com"
        git config --global user.name "workinguser1012"
        git add k8s_manifests/frontend-deployment.yaml k8s_manifests/backend-deployment.yaml
        git commit -m "Update image tags to ${{ github.run_id }}" [skip ci]
        git push      




  deploy:
    runs-on: ubuntu-latest
    needs: update-k8s
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Connect kubectl to EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name Three-tier-cloud

    - name: Install eksctl
      run: |
        curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
        sudo mv /tmp/eksctl /usr/local/bin

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Create IAM Policy for ALB
      run: |
        aws iam create-policy \
          --policy-name AWSLoadBalancerControllerIAMPolicy \
          --policy-document file://k8s_manifests/iam_policy.json || true

    - name: Associate OIDC Provider
      run: |
        eksctl utils associate-iam-oidc-provider \
          --region=us-east-1 \
          --cluster=Three-tier-cloud \
          --approve

    - name: Create IAM Service Account
      run: |
        eksctl create iamserviceaccount \
          --cluster=Three-tier-cloud \
          --namespace=kube-system \
          --name=aws-load-balancer-controller \
          --role-name AmazonEKSLoadBalancerControllerRole \
          --attach-policy-arn=arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:policy/AWSLoadBalancerControllerIAMPolicy \
          --approve \
          --region=us-east-1 

    - name: Install ALB Controller
      run: |
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update eks
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=Three-tier-cloud \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller
      
    
    - name: Wait for ALB Controller to be ready
      run: |
        kubectl rollout status deployment/aws-load-balancer-controller \
          -n kube-system \
          --timeout=120s       


    - name: Deploy to EKS
      run: |
        kubectl create namespace workshop --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f k8s_manifests/mongo/
        kubectl apply -f k8s_manifests/backend-deployment.yaml
        kubectl apply -f k8s_manifests/backend-service.yaml
        kubectl apply -f k8s_manifests/frontend-deployment.yaml
        kubectl apply -f k8s_manifests/frontend-service.yaml
        kubectl apply -f k8s_manifests/full_stack_lb.yaml

    - name: Wait for ALB and print URL
      run: |
        echo "Waiting for ALB to provision..."
        sleep 90
        kubectl get ing -n workshop       